  <main>
  <section class="card">
    <h1>Signing you in</h1>
    <p>SmartSwing is finalizing your secure sign-in and restoring your player or coach workspace.</p>
    <div class="status" id="statusBox">
      <strong>Connecting to Supabase Auth</strong>
      <span id="statusText">Please wait while we complete the OAuth callback.</span>
    </div>
    <div class="actions">
      <a class="btn" href="./login.html">Back to sign in</a>
      <a class="btn" href="./index.html">Homepage</a>
    </div>
  </section>

  <script src="./public-app-config.js"></script>

  <script src="/api/runtime-config.js"></script>
  <script src="./app-data.js"></script>
  <script>
    const store = window.SmartSwingStore;
    const statusText = document.getElementById('statusText');
    const statusBox = document.getElementById('statusBox');

    async function completeAuth() {
      if (!store.isSupabaseConfigured()) {
        statusBox.querySelector('strong').textContent = 'Supabase public config is missing';
        statusText.textContent = 'Add the production Supabase URL and anon key before using Google, Apple, or Meta login.';
        return;
      }

      try {
        // Detect PKCE authorization code from URL (OAuth redirect appends ?code=...)
        const urlParams = new URLSearchParams(window.location.search);
        const pkceCode = urlParams.get('code');

        if (pkceCode) {
          statusText.textContent = 'Completing secure OAuth verification…';
          // Get the initialized Supabase client (triggers detectSessionInUrl auto-exchange)
          const client = await store.getSupabaseClient();
          if (client) {
            // Explicit exchangeCodeForSession as a safety net for PKCE flow
            const { error: exchangeError } = await client.auth.exchangeCodeForSession(pkceCode);
            if (exchangeError) {
              // Non-fatal: detectSessionInUrl may have already handled it
              console.warn('[auth-callback] exchangeCodeForSession warning:', exchangeError.message);
            }
          }
        }

        const user = await store.restoreSupabaseSession();
        if (!user) {
          window.location.href = './login.html?type=error&message=' + encodeURIComponent('OAuth session was not completed. Please try again.');
          return;
        }
        statusBox.querySelector('strong').textContent = 'Authentication complete';
        statusText.textContent = 'Redirecting to your SmartSwing workspace…';

        // Fire-and-forget auto-enroll for new users
        try {
          const cfg = window.SMARTSWING_CONFIG || window.SMARTSWING_SUPABASE_CONFIG || {};
          fetch('/api/marketing/auto-enroll', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: user?.email || '',
              name: user?.user_metadata?.full_name || '',
              user_id: user?.id || '',
              supabase_url: cfg.url || cfg.supabaseUrl || '',
              supabase_key: cfg.anonKey || cfg.supabaseAnonKey || ''
            })
          }).catch(() => {}); // never block auth flow
        } catch (_) {}

        const destination = store.getPostAuthDestinationForUser(user);
        setTimeout(() => { window.location.href = destination; }, 450);
      } catch (error) {
        window.location.href = './login.html?type=error&message=' + encodeURIComponent(error.message || 'OAuth sign-in failed.');
      }
    }

    completeAuth();
  </script>
