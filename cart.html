<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSwing AI - Cart</title>
  <link rel="manifest" href="./manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#081426;--bg2:#0c1f39;--panel:rgba(10,24,43,.9);--line:rgba(255,255,255,.14);--text:#eaf2fb;--muted:#9db2c9;--orange:#ff6d00}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:"Plus Jakarta Sans",sans-serif;color:var(--text);background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);min-height:100vh}
    .page{max-width:980px;margin:0 auto;padding:24px 20px 64px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:24px;margin-bottom:16px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);font:inherit;font-weight:700;text-decoration:none;cursor:pointer}.btn.primary{border:none;background:linear-gradient(135deg,var(--orange),#ff8f00);color:#fff} h1,h2{font-family:"Sora",sans-serif;letter-spacing:-.02em} h1{font-size:42px;margin-bottom:12px} h2{font-size:22px;margin-bottom:8px}.muted{color:var(--muted);line-height:1.6}.list{display:grid;gap:12px}
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <h1>Your cart</h1>
      <p class="muted">This flow is ready for Stripe wiring later. For now it captures the selected plan, plan terms, and trial state before checkout.</p>
    </div>
    <div class="panel">
      <h2 id="planTitle">Selected plan</h2>
      <div class="list" id="cartDetails"></div>
      <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn" href="./pricing.html">Back to pricing</a>
        <a class="btn primary" id="checkoutBtn" href="./checkout.html">Continue to checkout</a>
      </div>
    </div>
  </div>
  <script src="./app-data.js"></script>
  <script>
    const store = window.SmartSwingStore;
    const params = new URLSearchParams(window.location.search);
    const planId = params.get('plan') || 'pro';
    const plan = store.PLAN_DEFINITIONS[planId] || store.PLAN_DEFINITIONS.pro;
    document.getElementById('planTitle').textContent = `${plan.name} | $${plan.monthlyPrice}/month`;
    document.getElementById('checkoutBtn').href = `./checkout.html?plan=${encodeURIComponent(planId)}`;
    const user = store.getCurrentUser();
    const trialEligibility = store.getTrialEligibility(user?.id, planId);
    document.getElementById('cartDetails').innerHTML = [
      `Monthly reviews: ${Number.isFinite(plan.monthlyReviews) ? plan.monthlyReviews : 'Unlimited'}`,
      `14-day trial: ${plan.id === 'free' ? 'Not applicable' : (trialEligibility.eligible ? 'Available on this account' : (trialEligibility.reason || 'Not available'))}`,
      `Included: ${plan.perks.join(' | ')}`
    ].map((item) => `<div class="muted">${item}</div>`).join('');
  </script>
</body>
</html>
