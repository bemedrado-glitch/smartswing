<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSwing AI - Unified Review</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    :root {
      --bg: #071425;
      --panel: #0c1f36;
      --line: rgba(0, 255, 136, 0.25);
      --text: #e8f0f8;
      --muted: #9db2c8;
      --primary: #00ff88;
      --secondary: #00d4ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 15% 0%, #10345c 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
      align-items: center;
    }

    .title {
      margin: 0;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .title span {
      color: var(--primary);
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, a.quick-link {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      font-size: 13px;
    }

    button.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #05111e;
      border-color: transparent;
    }

    .frame-wrap {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: 0 24px 40px rgba(0, 0, 0, 0.35);
    }

    iframe {
      width: 100%;
      height: calc(100vh - 170px);
      border: 0;
      background: #fff;
    }

    @media (max-width: 900px) {
      iframe {
        height: calc(100vh - 210px);
      }
    }
  </style>
  <!-- Vercel Web Analytics -->
  <script src="./analytics.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div>
        <h1 class="title"><span>SmartSwing AI</span> Unified Review</h1>
        <p class="subtitle">Single HTML entry to review homepage and analyzer from one place.</p>
      </div>
      <div class="actions">
        <button id="homeBtn" class="active" type="button">Homepage</button>
        <button id="analyzerBtn" type="button">Analyzer</button>
        <a class="quick-link" href="./index.html" target="_blank" rel="noopener">Open Home in New Tab</a>
        <a class="quick-link" href="./analyze.html" target="_blank" rel="noopener">Open Analyzer in New Tab</a>
      </div>
    </div>

    <div class="frame-wrap">
      <iframe id="reviewFrame" title="SmartSwing Review Frame" src="./index.html"></iframe>
    </div>
  </div>

  <script>
    const frame = document.getElementById('reviewFrame');
    const homeBtn = document.getElementById('homeBtn');
    const analyzerBtn = document.getElementById('analyzerBtn');

    function activate(tab) {
      const isHome = tab === 'home';
      frame.src = isHome ? './index.html' : './analyze.html';
      homeBtn.classList.toggle('active', isHome);
      analyzerBtn.classList.toggle('active', !isHome);
    }

    homeBtn.addEventListener('click', () => activate('home'));
    analyzerBtn.addEventListener('click', () => activate('analyzer'));
  </script>
</body>
</html>
