<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSwing AI - Integration Settings</title>
  <meta name="robots" content="noindex,nofollow,noarchive">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #0b1220; color: #e8f0ff; }
    .card { max-width: 780px; margin: 0 auto; background: #111b30; border: 1px solid #223250; border-radius: 12px; padding: 20px; }
    h1 { margin-top: 0; }
    label { display: block; margin-top: 14px; margin-bottom: 6px; font-weight: 700; }
    input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #2d4368; background: #0e1730; color: #fff; }
    button { margin-top: 12px; margin-right: 8px; padding: 10px 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; }
    .primary { background: #28d17c; color: #03140c; }
    .secondary { background: #2e3f61; color: #fff; }
    .muted { color: #9fb1cf; font-size: 13px; margin-top: 8px; }
    pre { background: #0a1326; border: 1px solid #23395f; border-radius: 8px; padding: 12px; overflow: auto; }
  </style>
  <!-- Vercel Web Analytics -->
  <script src="./analytics.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="card">
    <h1>Integration Settings</h1>
    <p>Configure public Supabase credentials for this browser session. Use only the public anon key.</p>
    <label for="url">Supabase URL</label>
    <input id="url" placeholder="https://your-project.supabase.co">

    <label for="anon">Supabase Anon Key</label>
    <input id="anon" placeholder="eyJhbGciOi...">

    <div>
      <button class="primary" onclick="saveConfig()">Save Config</button>
      <button class="secondary" onclick="clearConfig()">Clear Config</button>
      <button class="secondary" onclick="runSync()">Run Sync Now</button>
    </div>

    <p class="muted">Current config is stored in localStorage key `smartswing_supabase_config`.</p>
    <pre id="status">Waiting...</pre>
  </div>

  <script src="./public-app-config.js"></script>
  <script src="./app-data.js"></script>
  <script>
    const store = window.SmartSwingStore;
    const statusEl = document.getElementById('status');

    function refresh() {
      const cfg = store.read('smartswing_supabase_config', null);
      document.getElementById('url').value = cfg?.url || '';
      document.getElementById('anon').value = cfg?.anonKey || '';
      statusEl.textContent = JSON.stringify({
        supabaseConfigured: store.isSupabaseConfigured(),
        currentUser: store.getCurrentUser()?.email || null
      }, null, 2);
    }

    function saveConfig() {
      try {
        store.setSupabaseConfig({
          url: document.getElementById('url').value.trim(),
          anonKey: document.getElementById('anon').value.trim()
        });
        refresh();
      } catch (error) {
        statusEl.textContent = `Error: ${error.message}`;
      }
    }

    function clearConfig() {
      store.clearSupabaseConfig();
      refresh();
    }

    async function runSync() {
      try {
        await store.syncNow();
        statusEl.textContent = 'Sync completed successfully.';
      } catch (error) {
        statusEl.textContent = `Sync error: ${error.message}`;
      }
    }

    refresh();
  </script>
</body>
</html>
