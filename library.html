<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSwing AI - Drills and Tactics Library</title>
  <link rel="manifest" href="./manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --bg2: #0e1510;
      --panel: rgba(16, 18, 17, 0.94);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f5f5f7;
      --muted: #eef3f7;
      --green: #39ff14;
      --cyan: #ffd84d;
      --orange: #ffd84d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(57,255,20,0.12), transparent 25%),
        radial-gradient(circle at top right, rgba(255,216,77,0.1), transparent 30%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      min-height: 100vh;
    }
    .page { max-width: 1300px; margin: 0 auto; padding: 24px 20px 64px; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .logo {
      text-decoration: none;
      font-size: 30px;
      font-weight: 900;
      color: var(--green);
    }
    .nav { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      text-decoration: none;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 11px 14px;
      color: var(--text);
      font-weight: 800;
      background: rgba(255, 255, 255, 0.03);
    }
    .btn-primary {
      border: none;
      color: #fff;
      background: linear-gradient(135deg, var(--green), #82ff63);
      color: #0e1012;
    }
    .hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px;
      margin-bottom: 16px;
    }
    h1 { font-size: 40px; line-height: 1.05; margin-bottom: 10px; }
    h2 { font-size: 24px; margin-bottom: 10px; color: var(--green); }
    .muted { color: var(--muted); line-height: 1.7; }
    .filters {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 10px;
    }
    select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255,255,255,0.04);
      font: inherit;
    }
    select option { color: #111; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      min-height: 360px;
    }
    .list { display: grid; gap: 10px; }
    .hero,.panel,.card,.btn{transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}
    .hero:hover,.panel:hover,.card:hover,.btn:hover{transform:translateY(-3px);border-color:rgba(57,255,20,.3);box-shadow:0 18px 46px rgba(0,0,0,.28)}
    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
    }
    .card summary {
      list-style: none;
      cursor: pointer;
      padding: 14px;
    }
    .card summary::-webkit-details-marker { display: none; }
    .detail-body { padding: 0 14px 14px; }
    .title { font-size: 16px; font-weight: 800; margin-bottom: 4px; color: var(--green); }
    .meta { font-size: 12px; color: var(--orange); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
    .lock {
      margin-top: 8px;
      border: 1px solid rgba(255, 143, 0, 0.34);
      background: rgba(255, 143, 0, 0.12);
      color: #ffd7a0;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
    }
    @media (max-width: 980px) {
      .grid, .filters { grid-template-columns: 1fr; }
      h1 { font-size: 32px; }
    }
  </style>
  <!-- Vercel Web Analytics -->
  <script src="./analytics.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="page">
    <header class="top">
      <a class="logo" href="./index.html">SmartSwing AI</a>
      <div class="nav">
        <a class="btn" href="./dashboard.html">Player Dashboard</a>
        <a class="btn" href="./coach-dashboard.html">Coach Dashboard</a>
        <a class="btn" href="./analyze.html">Analyzer</a>
        <a class="btn btn-primary" href="./pricing.html">Upgrade Plan</a>
      </div>
    </header>

    <section class="hero">
      <h1>Drills and Tactics Library</h1>
      <p class="muted" id="planSummary"></p>
      <div class="filters">
        <select id="levelFilter">
          <option value="">All levels</option>
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
          <option value="pro">Pro</option>
        </select>
        <select id="shotFilter">
          <option value="">All shot types</option>
          <option value="forehand">Forehand</option>
          <option value="backhand">Backhand</option>
          <option value="serve">Serve</option>
          <option value="volley">Volley</option>
          <option value="slice">Slice</option>
          <option value="drop-shot">Drop Shot</option>
          <option value="lob">Lob</option>
          <option value="return">Return</option>
        </select>
        <select id="contextFilter">
          <option value="">All tactic contexts</option>
          <option value="serve">Serve</option>
          <option value="baseline">Baseline</option>
          <option value="net">Net</option>
          <option value="defense">Defense</option>
          <option value="point-construction">Point construction</option>
          <option value="general">General match play</option>
        </select>
      </div>
    </section>

    <section class="grid">
      <article class="panel">
        <h2>Drill Videos</h2>
        <div id="drillList" class="list"></div>
      </article>
      <article class="panel">
        <h2>Tactical Playbooks</h2>
        <div id="tacticList" class="list"></div>
      </article>
    </section>
  </div>

  <script src="./public-app-config.js"></script>
  <script src="./app-data.js"></script>
  <script src="./pwa.js"></script>
  <script>
    const store = window.SmartSwingStore;
    const user = store.getCurrentUser();
    const plan = store.getCurrentPlan();
    const hasLibrary = store.canAccessLibrary();

    function renderPlanSummary() {
      const usage = user ? store.canGenerateReport(user.id) : { used: 0, limit: 1 };
      const usageText = Number.isFinite(usage.limit) ? `${usage.used}/${usage.limit}` : `${usage.used}/Unlimited`;
      document.getElementById('planSummary').textContent =
        `Active plan: ${plan.name}. Monthly reports used: ${usageText}. ${hasLibrary ? 'Library links are unlocked.' : 'Upgrade to Performance or Tournament plan to unlock library links and tactical video access.'}`;
    }

    function renderLibrary() {
      const level = document.getElementById('levelFilter').value;
      const shot = document.getElementById('shotFilter').value;
      const context = document.getElementById('contextFilter').value;

      const drills = store.getDrillLibrary({ level, shotType: shot }).slice(0, 40);
      const tactics = store.getTacticLibrary({ level, situation: context }).slice(0, 40);

      const drillList = document.getElementById('drillList');
      if (!drills.length) {
        drillList.innerHTML = '<div class="muted">No drills match your current filters.</div>';
      } else {
        drillList.innerHTML = drills.map((drill, index) => `
          <details class="card" ${index === 0 ? 'open' : ''}>
            <summary>
              <div class="title">${drill.title}</div>
              <div class="meta">${drill.channel} | ${drill.skillLevel} | ${drill.strokeType} | ${drill.duration || ''}</div>
              <div class="muted">${drill.focus}</div>
            </summary>
            <div class="detail-body">
              ${drill.targets?.length ? `<div class="muted" style="margin-top:8px;"><strong>Targets:</strong> ${drill.targets.slice(0, 3).join(' | ')}</div>` : ''}
              ${drill.expectedImprovement && Object.keys(drill.expectedImprovement).length ? `<div class="muted" style="margin-top:8px;"><strong>Expected gain:</strong> ${Object.values(drill.expectedImprovement).slice(0, 2).join(' | ')}</div>` : ''}
              ${hasLibrary ? `<div style="margin-top:10px;"><a href="${drill.videoUrl}" target="_blank" rel="noopener">Open video</a></div>` : '<div class="lock">Upgrade required to open external drill video links.</div>'}
            </div>
          </details>
        `).join('');
      }

      const tacticList = document.getElementById('tacticList');
      if (!tactics.length) {
        tacticList.innerHTML = '<div class="muted">No tactics match your current filters.</div>';
      } else {
        tacticList.innerHTML = tactics.map((tactic, index) => `
          <details class="card" ${index === 0 ? 'open' : ''}>
            <summary>
              <div class="title">${tactic.title}</div>
              <div class="meta">${tactic.channel} | ${tactic.skillLevel} | ${tactic.situation}</div>
              <div class="muted">${tactic.summary}</div>
            </summary>
            <div class="detail-body">
              ${tactic.tacticalFocus?.length ? `<div class="muted" style="margin-top:8px;"><strong>Focus:</strong> ${tactic.tacticalFocus.slice(0, 3).join(' | ')}</div>` : ''}
              ${tactic.expectedImprovement ? `<div class="muted" style="margin-top:8px;"><strong>Expected impact:</strong> ${Object.values(tactic.expectedImprovement).slice(0, 2).join(' | ')}</div>` : ''}
              ${hasLibrary ? `<div style="margin-top:10px;"><a href="${tactic.videoUrl}" target="_blank" rel="noopener">Open tactical video</a></div>` : '<div class="lock">Upgrade required to open tactical video links.</div>'}
            </div>
          </details>
        `).join('');
      }
    }

    document.getElementById('levelFilter').addEventListener('change', renderLibrary);
    document.getElementById('shotFilter').addEventListener('change', renderLibrary);
    document.getElementById('contextFilter').addEventListener('change', renderLibrary);

    renderPlanSummary();
    renderLibrary();
  </script>
</body>
</html>
