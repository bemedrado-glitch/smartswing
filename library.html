<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="./assets/logos/icon.png">
  <link rel="apple-touch-icon" href="./assets/logos/icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library · SmartSwing AI</title>
  <meta name="description" content="Tennis drills and tactical playbooks matched to your level, shot type, and on-court context.">
  <meta name="robots" content="noindex,nofollow">
  <link rel="canonical" href="https://www.smartswingai.com/library.html">
  <meta property="og:title" content="SmartSwing AI Library">
  <meta property="og:description" content="Tennis drills and tactical playbooks filtered by level, shot type, and match context.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.smartswingai.com/library.html">
  <meta property="og:image" content="https://www.smartswingai.com/assets/logos/logo.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="manifest" href="./manifest.json">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Sora:wght@700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet"></noscript>

  <link rel="stylesheet" href="./brand-tokens.css">
  <link rel="stylesheet" href="./app-shell.css">
  <link rel="stylesheet" href="./empty-state.css">
  <link rel="stylesheet" href="./skeleton-loader.css">
  <link rel="stylesheet" href="./safe-area.css">
  <link rel="stylesheet" href="./toast.css">
  <script src="./app-shell.js" defer></script>
  <script src="./toast.js" defer></script>
  <script src="./shared-chrome.js" defer></script>
  <style>
    /* Library uses the canonical app-shell for chrome + brand-tokens for color.
       Page-local vars alias --ss-* with safe fallbacks so the page still looks
       right if brand-tokens.css ever fails to load. */
    :root {
      --bg:    #050505;
      --bg2:   #0e1510;
      --panel: rgba(16, 18, 17, 0.94);
      --line:  rgba(255, 255, 255, 0.10);
      --text:  var(--ss-text, #f5f5f7);
      --muted: var(--ss-text-muted, rgba(255,255,255,0.55));
      --volt:  var(--ss-volt, #39ff14);
      --gold:  var(--ss-gold, #ffd84d);
      --teal:  var(--ss-teal, #22d3ee);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--ss-font-body, "DM Sans", -apple-system, sans-serif);
      color: var(--text);
      background:
        radial-gradient(circle at 5% 0%, rgba(57,255,20,0.10), transparent 26%),
        radial-gradient(circle at 95% 0%, rgba(255,216,77,0.08), transparent 30%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      min-height: 100vh;
      min-height: 100dvh;
      padding-bottom: 80px; /* reserve room for the fixed mobile bottom nav */
      -webkit-tap-highlight-color: transparent;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    a { color: inherit; text-decoration: none; }
    :focus-visible { outline: 2px solid var(--volt); outline-offset: 2px; border-radius: 4px; }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .lib-main { max-width: 1100px; margin: 0 auto; padding: 24px 20px 32px; }

    /* ── Page hero — concise, confidence-building ─────────────────────── */
    .lib-hero {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .lib-hero__title {
      font-family: var(--ss-font-display, "Sora", "DM Sans", sans-serif);
      font-size: clamp(26px, 3.5vw, 34px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .lib-hero__title .accent { color: var(--volt); }
    .lib-hero__sub {
      font-size: 14px;
      color: var(--muted);
      max-width: 520px;
    }
    .lib-hero__plan {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(57,255,20,0.06);
      border: 1px solid rgba(57,255,20,0.22);
      font-size: 13px;
      font-weight: 700;
    }
    .lib-hero__plan .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--volt);
    }
    .lib-hero__plan.locked {
      background: rgba(255,216,77,0.06);
      border-color: rgba(255,216,77,0.22);
    }
    .lib-hero__plan.locked .dot { background: var(--gold); }
    .lib-hero__plan a { color: var(--volt); margin-left: 6px; text-decoration: underline; }

    /* ── Tabs — Drills / Tactics segmented control ──────────────────── */
    .lib-tabs {
      display: inline-flex;
      padding: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      border-radius: 14px;
      margin-bottom: 16px;
    }
    .lib-tab {
      padding: 9px 18px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      transition: background 160ms, color 160ms;
    }
    .lib-tab.is-active {
      background: var(--volt);
      color: #0a0a0a;
    }
    .lib-tab .count {
      margin-left: 6px;
      opacity: 0.75;
      font-weight: 600;
    }

    /* ── Filter chips row (horizontal scroll on mobile) ────────────── */
    .lib-filters {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 10px;
      margin-bottom: 14px;
      scrollbar-width: none;
    }
    .lib-filters::-webkit-scrollbar { display: none; }
    .lib-filters__group {
      display: inline-flex;
      flex-shrink: 0;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 4px;
      gap: 2px;
    }
    .lib-chip {
      padding: 7px 13px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 140ms, color 140ms;
    }
    .lib-chip.is-active {
      background: rgba(57,255,20,0.12);
      color: var(--volt);
    }
    @media (hover: hover) and (pointer: fine) {
      .lib-chip:not(.is-active):hover { color: var(--text); }
    }

    /* ── Card list ─────────────────────────────────────────────────── */
    .lib-list { display: grid; gap: 10px; }

    .lib-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 160ms, transform 160ms;
    }
    @media (hover: hover) and (pointer: fine) {
      .lib-card:hover { border-color: rgba(57,255,20,0.25); transform: translateY(-1px); }
    }
    .lib-card__head {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }
    .lib-card__icon {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(57,255,20,0.08);
      color: var(--volt);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .lib-card__body { flex: 1; min-width: 0; }
    .lib-card__title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
      /* Prevent very long titles from blowing the layout on mobile. */
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .lib-card__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .lib-card__meta span {
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
    }
    .lib-card__meta .lvl-beginner   { color: #8ac9ff; }
    .lib-card__meta .lvl-intermediate { color: var(--volt); }
    .lib-card__meta .lvl-advanced   { color: var(--gold); }
    .lib-card__meta .lvl-pro        { color: #ff7a7a; }

    .lib-card__chevron {
      flex-shrink: 0;
      color: var(--muted);
      transition: transform 180ms, color 180ms;
    }
    .lib-card.is-open .lib-card__chevron { transform: rotate(90deg); color: var(--volt); }
    .lib-card__detail {
      display: none;
      padding: 0 16px 16px 70px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .lib-card.is-open .lib-card__detail { display: block; }
    @media (max-width: 560px) {
      .lib-card__detail { padding: 0 16px 16px; }
    }
    .lib-card__summary { margin-bottom: 10px; color: var(--text); }
    .lib-card__row { margin-top: 8px; }
    .lib-card__row strong { color: var(--text); margin-right: 4px; }
    .lib-card__cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 9px 16px;
      border-radius: 999px;
      background: var(--volt);
      color: #0a0a0a;
      font-weight: 800;
      font-size: 13px;
      text-decoration: none;
      transition: transform 160ms;
    }
    .lib-card__cta:hover { transform: translateY(-1px); }
    .lib-card__lock {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255,216,77,0.06);
      border: 1px solid rgba(255,216,77,0.22);
      color: var(--gold);
      font-size: 13px;
      font-weight: 600;
    }
    .lib-card__lock a { color: var(--volt); text-decoration: underline; margin-left: auto; font-weight: 800; }

    /* ── Tab panel switching ──────────────────────────────────────── */
    .lib-panel[hidden] { display: none; }

    /* ── Mobile tuning ────────────────────────────────────────────── */
    @media (max-width: 560px) {
      .lib-hero { align-items: flex-start; }
      .lib-hero__plan { width: 100%; justify-content: center; }
      .lib-tab { padding: 9px 14px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <!-- Canonical app-shell chrome (rendered by app-shell.js) -->
  <div data-ss-app-topbar></div>

  <main class="lib-main" id="main-content">
    <!-- ── Hero ─────────────────────────────────────────────────── -->
    <header class="lib-hero">
      <div>
        <h1 class="lib-hero__title" data-i18n="library.title">
          Drills &amp; <span class="accent">Tactics</span>
        </h1>
        <p class="lib-hero__sub" data-i18n="library.subtitle">
          Filter by level and shot to find the exact drill or tactical pattern you need.
        </p>
      </div>
      <div id="planPill" class="lib-hero__plan" aria-live="polite">
        <span class="dot" aria-hidden="true"></span>
        <span id="planPillText">Loading plan…</span>
      </div>
    </header>

    <!-- ── Tabs ─────────────────────────────────────────────────── -->
    <div role="tablist" aria-label="Library sections" class="lib-tabs">
      <button type="button" role="tab" aria-selected="true"  aria-controls="drillsPanel"  id="drillsTab"  class="lib-tab is-active" data-tab="drills">
        Drills <span class="count" id="drillsCount"></span>
      </button>
      <button type="button" role="tab" aria-selected="false" aria-controls="tacticsPanel" id="tacticsTab" class="lib-tab" data-tab="tactics">
        Tactics <span class="count" id="tacticsCount"></span>
      </button>
    </div>

    <!-- ── Filter chips ─────────────────────────────────────────── -->
    <div class="lib-filters" aria-label="Filter library">
      <div class="lib-filters__group" role="group" aria-label="Player level">
        <button type="button" class="lib-chip is-active" data-filter="level" data-value="">All levels</button>
        <button type="button" class="lib-chip" data-filter="level" data-value="beginner">Beginner</button>
        <button type="button" class="lib-chip" data-filter="level" data-value="intermediate">Intermediate</button>
        <button type="button" class="lib-chip" data-filter="level" data-value="advanced">Advanced</button>
        <button type="button" class="lib-chip" data-filter="level" data-value="pro">Pro</button>
      </div>
      <div class="lib-filters__group" role="group" aria-label="Shot type" id="shotChipGroup">
        <button type="button" class="lib-chip is-active" data-filter="shot" data-value="">All shots</button>
        <button type="button" class="lib-chip" data-filter="shot" data-value="forehand">Forehand</button>
        <button type="button" class="lib-chip" data-filter="shot" data-value="backhand">Backhand</button>
        <button type="button" class="lib-chip" data-filter="shot" data-value="serve">Serve</button>
        <button type="button" class="lib-chip" data-filter="shot" data-value="volley">Volley</button>
        <button type="button" class="lib-chip" data-filter="shot" data-value="slice">Slice</button>
      </div>
      <!-- Context chips only appear on the Tactics tab via CSS toggle below. -->
      <div class="lib-filters__group" role="group" aria-label="Match situation" id="contextChipGroup" hidden>
        <button type="button" class="lib-chip is-active" data-filter="context" data-value="">All contexts</button>
        <button type="button" class="lib-chip" data-filter="context" data-value="baseline">Baseline</button>
        <button type="button" class="lib-chip" data-filter="context" data-value="net">Net</button>
        <button type="button" class="lib-chip" data-filter="context" data-value="defense">Defense</button>
        <button type="button" class="lib-chip" data-filter="context" data-value="point-construction">Point construction</button>
      </div>
    </div>

    <!-- ── Drills panel ─────────────────────────────────────────── -->
    <section role="tabpanel" aria-labelledby="drillsTab" id="drillsPanel" class="lib-panel">
      <div id="drillList" class="lib-list" data-skeleton="list-row" data-skeleton-count="5" aria-live="polite"></div>
    </section>

    <!-- ── Tactics panel ────────────────────────────────────────── -->
    <section role="tabpanel" aria-labelledby="tacticsTab" id="tacticsPanel" class="lib-panel" hidden>
      <div id="tacticList" class="lib-list" data-skeleton="list-row" data-skeleton-count="5" aria-live="polite"></div>
    </section>
  </main>

  <!-- Canonical app-shell bottom nav (rendered by app-shell.js) -->
  <div data-ss-app-bottom-nav></div>

  <!-- Canonical footer (rendered by shared-chrome.js) -->
  <div data-ss-footer></div>

  <script src="./public-app-config.js"></script>
  <script src="./analytics.js" defer></script>
  <script src="/api/runtime-config.js"></script>
  <script src="./app-data.js"></script>
  <script src="./pwa.js"></script>
  <script>
    // ── Library state ──────────────────────────────────────────────
    const store = window.SmartSwingStore;
    const user = store.getCurrentUser();
    const plan = store.getCurrentPlan();
    const hasLibrary = store.canAccessLibrary();

    // Filter state — kept as a single object so the renderer is pure.
    const filters = { level: '', shot: '', context: '', tab: 'drills' };

    // Map raw level → CSS class for the colored skill-level pill.
    function levelClass(level) {
      const k = String(level || '').toLowerCase();
      if (k.startsWith('begin')) return 'lvl-beginner';
      if (k.startsWith('inter')) return 'lvl-intermediate';
      if (k.startsWith('adv'))   return 'lvl-advanced';
      if (k === 'pro' || k.includes('atp')) return 'lvl-pro';
      return 'lvl-intermediate';
    }

    function prettyDuration(d) {
      if (!d) return '';
      const s = String(d).trim();
      return s ? s : '';
    }

    // ── Plan pill ──────────────────────────────────────────────────
    function renderPlanPill() {
      const pill = document.getElementById('planPill');
      const txt  = document.getElementById('planPillText');
      if (!pill || !txt) return;
      const name = user?.fullName?.split(' ')[0] || 'Guest';
      if (hasLibrary) {
        pill.classList.remove('locked');
        txt.innerHTML = `Hey <strong>${name}</strong> — full library unlocked`;
      } else {
        pill.classList.add('locked');
        txt.innerHTML = `Previewing · <a href="./pricing.html?src=library">Upgrade to unlock videos</a>`;
      }
    }

    // ── Card HTML builders ────────────────────────────────────────
    function drillIcon() {
      return '🎾';
    }
    function tacticIcon() {
      return '🧭';
    }

    function renderDrillCard(drill, idx) {
      const duration = prettyDuration(drill.duration);
      const targetsLine = drill.targets?.length
        ? `<div class="lib-card__row"><strong>Targets:</strong> ${drill.targets.slice(0, 3).join(' · ')}</div>`
        : '';
      const gainLine = drill.expectedImprovement && Object.keys(drill.expectedImprovement).length
        ? `<div class="lib-card__row"><strong>Expected gain:</strong> ${Object.values(drill.expectedImprovement).slice(0, 2).join(' · ')}</div>`
        : '';
      const cta = hasLibrary
        ? `<a class="lib-card__cta" href="${drill.videoUrl}" target="_blank" rel="noopener">Open video →</a>`
        : `<div class="lib-card__lock">
             <span>🔒 Video locked on free plan</span>
             <a href="./pricing.html?src=library_drill">Upgrade</a>
           </div>`;

      return `
        <article class="lib-card" data-idx="${idx}">
          <div class="lib-card__head" role="button" tabindex="0" aria-expanded="false">
            <div class="lib-card__icon" aria-hidden="true">${drillIcon()}</div>
            <div class="lib-card__body">
              <div class="lib-card__title">${drill.title || 'Untitled drill'}</div>
              <div class="lib-card__meta">
                <span class="${levelClass(drill.skillLevel)}">${drill.skillLevel || 'All levels'}</span>
                <span>${drill.strokeType || 'All strokes'}</span>
                ${duration ? `<span>${duration}</span>` : ''}
              </div>
            </div>
            <svg class="lib-card__chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
          <div class="lib-card__detail">
            ${drill.focus ? `<div class="lib-card__summary">${drill.focus}</div>` : ''}
            ${targetsLine}
            ${gainLine}
            ${cta}
          </div>
        </article>
      `;
    }

    function renderTacticCard(tactic, idx) {
      const focusLine = tactic.tacticalFocus?.length
        ? `<div class="lib-card__row"><strong>Focus:</strong> ${tactic.tacticalFocus.slice(0, 3).join(' · ')}</div>`
        : '';
      const gainLine = tactic.expectedImprovement
        ? `<div class="lib-card__row"><strong>Expected impact:</strong> ${Object.values(tactic.expectedImprovement).slice(0, 2).join(' · ')}</div>`
        : '';
      const cta = hasLibrary
        ? `<a class="lib-card__cta" href="${tactic.videoUrl}" target="_blank" rel="noopener">Watch breakdown →</a>`
        : `<div class="lib-card__lock">
             <span>🔒 Video locked on free plan</span>
             <a href="./pricing.html?src=library_tactic">Upgrade</a>
           </div>`;

      return `
        <article class="lib-card" data-idx="${idx}">
          <div class="lib-card__head" role="button" tabindex="0" aria-expanded="false">
            <div class="lib-card__icon" aria-hidden="true">${tacticIcon()}</div>
            <div class="lib-card__body">
              <div class="lib-card__title">${tactic.title || 'Untitled tactic'}</div>
              <div class="lib-card__meta">
                <span class="${levelClass(tactic.skillLevel)}">${tactic.skillLevel || 'All levels'}</span>
                <span>${tactic.situation || 'General'}</span>
              </div>
            </div>
            <svg class="lib-card__chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
          <div class="lib-card__detail">
            ${tactic.summary ? `<div class="lib-card__summary">${tactic.summary}</div>` : ''}
            ${focusLine}
            ${gainLine}
            ${cta}
          </div>
        </article>
      `;
    }

    // ── Rendering ─────────────────────────────────────────────────
    function renderLists() {
      const drills  = store.getDrillLibrary({ level: filters.level,  shotType: filters.shot   }).slice(0, 40);
      const tactics = store.getTacticLibrary({ level: filters.level, situation: filters.context }).slice(0, 40);

      // Tab counts ride along with each filter change.
      document.getElementById('drillsCount').textContent  = drills.length ? drills.length : '';
      document.getElementById('tacticsCount').textContent = tactics.length ? tactics.length : '';

      const drillList = document.getElementById('drillList');
      if (drills.length) {
        drillList.innerHTML = drills.map(renderDrillCard).join('');
      } else {
        drillList.innerHTML =
          '<div class="ss-empty">' +
            '<div class="ss-empty__icon" aria-hidden="true">🎾</div>' +
            '<h3 class="ss-empty__title">No drills match these filters</h3>' +
            '<p class="ss-empty__body">Try a different skill level or shot type — or clear the filters to browse the full catalog.</p>' +
          '</div>';
      }

      const tacticList = document.getElementById('tacticList');
      if (tactics.length) {
        tacticList.innerHTML = tactics.map(renderTacticCard).join('');
      } else {
        tacticList.innerHTML =
          '<div class="ss-empty">' +
            '<div class="ss-empty__icon" aria-hidden="true">🧭</div>' +
            '<h3 class="ss-empty__title">No tactics match these filters</h3>' +
            '<p class="ss-empty__body">Switch skill level or match situation to see tactical playbooks for different scenarios.</p>' +
          '</div>';
      }
    }

    // ── Wire card expand / collapse (delegated for freshly rendered cards) ──
    function wireCardClicks(panelId) {
      const panel = document.getElementById(panelId);
      if (!panel) return;
      panel.addEventListener('click', (e) => {
        const head = e.target.closest('.lib-card__head');
        if (!head) return;
        // Don't toggle when the user clicks the video CTA inside the detail.
        if (e.target.closest('.lib-card__cta, .lib-card__lock a')) return;
        const card = head.closest('.lib-card');
        const open = card.classList.toggle('is-open');
        head.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
      panel.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        const head = e.target.closest('.lib-card__head');
        if (!head) return;
        e.preventDefault();
        head.click();
      });
    }

    // ── Wire tabs ──────────────────────────────────────────────────
    function activateTab(name) {
      filters.tab = name;
      const drills  = name === 'drills';
      document.getElementById('drillsTab').classList.toggle('is-active', drills);
      document.getElementById('tacticsTab').classList.toggle('is-active', !drills);
      document.getElementById('drillsTab').setAttribute('aria-selected',  drills);
      document.getElementById('tacticsTab').setAttribute('aria-selected', !drills);
      document.getElementById('drillsPanel').hidden  = !drills;
      document.getElementById('tacticsPanel').hidden = drills;
      // The shot-type chip group is more useful for drills; the context chip
      // group only makes sense for tactics. Swap visibility on tab change.
      document.getElementById('shotChipGroup').hidden    = !drills;
      document.getElementById('contextChipGroup').hidden =  drills;
    }

    document.getElementById('drillsTab').addEventListener('click',  () => activateTab('drills'));
    document.getElementById('tacticsTab').addEventListener('click', () => activateTab('tactics'));

    // ── Wire filter chips ─────────────────────────────────────────
    document.querySelectorAll('.lib-chip').forEach((chip) => {
      chip.addEventListener('click', () => {
        const filter = chip.dataset.filter;
        const value  = chip.dataset.value;
        filters[filter] = value;
        // Visually toggle within the chip's group.
        const group = chip.closest('.lib-filters__group');
        group.querySelectorAll('.lib-chip').forEach((c) => c.classList.toggle('is-active', c === chip));
        renderLists();
      });
    });

    // ── Init ──────────────────────────────────────────────────────
    renderPlanPill();
    renderLists();
    wireCardClicks('drillsPanel');
    wireCardClicks('tacticsPanel');
  </script>
  <script src="./i18n.js" defer></script>
  <script src="./skeleton-loader.js" defer></script>
</body>
</html>
