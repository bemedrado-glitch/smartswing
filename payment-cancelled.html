  <style>
    :root{--bg:#0a0a0a;--panel:rgba(28,28,30,.92);--line:rgba(255,255,255,.1);--text:#f5f5f7;--muted: var(--ss-text-muted, #eef3f7);--volt:#39ff14;--accent:#ffd84d;--dark:#0e1012}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family: var(--ss-font-body, "DM Sans",sans-serif);color:var(--text);background:radial-gradient(circle at top left, rgba(255,216,77,.06), transparent 24%),linear-gradient(180deg,#050505 0%,#0a0a0a 50%,#101010 100%);min-height:100vh}
    .page{width:min(920px,calc(100% - 32px));margin:0 auto;padding:28px 0 72px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
    .brand{text-decoration:none;font-size:26px;font-weight:800;letter-spacing:-.05em;color:var(--volt)}
    .brand span{color:var(--volt)}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:28px;padding:28px}
    .eyebrow{display:inline-flex;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,216,77,.12);color:var(--accent);border:1px solid rgba(255,216,77,.22)}
    h1{font-size:clamp(38px,6vw,62px);line-height:.95;letter-spacing:-.06em;margin:16px 0 14px;max-width:12ch}
    p{line-height:1.7}
    .muted{color:var(--muted)}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}
    .btn,.btn-primary{text-decoration:none;border-radius:999px;padding:12px 18px;font-weight:700;font-size:14px;transition:transform .18s ease}
    .btn{border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text)}
    .btn-primary{border:1px solid rgba(57,255,20,.35);background:linear-gradient(135deg,var(--volt),#82ff63);color:var(--dark)}
    .btn:hover,.btn-primary:hover{transform:translateY(-2px)}
  .brand-logo, .footer-logo { display: block; height: auto; max-width: 100%; }
.brand-logo { height: 80px; width: auto; }
.footer-logo { height: 64px; width: auto; }

  <div class="page">
    <header class="top">
      <a class="brand" id="brandLink" href="./index.html"><img src="./assets/logos/logo.png" alt="SmartSwing AI" class="brand-logo" width="190" height="80"></a>
      <div style="display:flex;align-items:center;gap:12px;">
        <span id="pcUserInfo" style="font-size:13px;color:rgba(255,255,255,.5);font-weight:600;"></span>
        <a class="btn" id="pricingLink" href="./pricing.html" data-i18n="payment.backToPricing">Back to pricing</a>
      </div>
    </header>

    <main>
    <section class="panel">
      <div class="eyebrow" data-i18n="payment.cancelled">Checkout cancelled</div>
      <h1 data-i18n="payment.noChanges">No changes were made to your plan.</h1>
      <p class="muted" id="cancelSummary" data-i18n="payment.cancelledBody">Your current SmartSwing access stays exactly as it was. If you canceled Stripe Checkout, no subscription was created and you can return anytime when you are ready.</p>
      <div class="actions">
        <a class="btn-primary" id="checkoutLink" href="./checkout.html" data-i18n="payment.returnToCheckout">Return to checkout</a>
        <a class="btn" id="compareLink" href="./pricing.html" data-i18n="payment.comparePlans">Compare plans again</a>
        <a class="btn" id="dashboardLink" href="./dashboard.html" data-i18n="payment.openDashboard">Open dashboard</a>
      </div>
    </section>
    </main>
  </div>

  <script src="./public-app-config.js"></script>
  <script src="./analytics.js" defer></script>
  <script src="/api/runtime-config.js"></script>
  <script src="./app-data.js"></script>
  <script>
    // Show user info
    (function(){
      var store = window.SmartSwingStore;
      var el = document.getElementById('pcUserInfo');
      if (el && store) {
        var u = store.getCurrentUser();
        var p = u ? store.getCurrentPlan(u.id) : null;
        if (u) el.textContent = (u.fullName || u.email || '') + (p ? ' \u00B7 ' + p.name : '');
      }
    })();
    const brandLink = document.getElementById('brandLink');
    const pricingLink = document.getElementById('pricingLink');
    const checkoutLink = document.getElementById('checkoutLink');
    const compareLink = document.getElementById('compareLink');
    const dashboardLink = document.getElementById('dashboardLink');
    const cancelSummary = document.getElementById('cancelSummary');

    if (window.SmartSwingStore?.getPendingExternalCheckout) {
      const pending = window.SmartSwingStore.getPendingExternalCheckout();
      if (pending?.planId) {
        const interval = pending.billingInterval || 'monthly';
        const checkoutBase = pending.checkoutPath || './checkout.html';
        const compareBase = './pricing.html';
        checkoutLink.href = `${checkoutBase}?plan=${encodeURIComponent(pending.planId)}${pending.planId !== 'free' ? `&interval=${encodeURIComponent(interval)}` : ''}`;
        compareLink.href = compareBase;
      }
    }
    if (window.SmartSwingStore?.clearPendingExternalCheckout) {
      window.SmartSwingStore.clearPendingExternalCheckout();
    }
  </script>

.ss-footer-col strong{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:16px;display:block}
